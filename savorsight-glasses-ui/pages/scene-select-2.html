<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择模式</title>
    <style id="theme-vars">
/* SavorSight Glasses Bare UI — Rokid Glasses Design System */

:root {
  /* Color */
  --glasses-bg: #000000;
  --glasses-fg: #00FF00;
  --glasses-fg-dim: #00FF004D;
  --glasses-fg-muted: #00FF00BF;
  --glasses-stroke-thin: 1px;
  --glasses-stroke-normal: 2px;
  --glasses-stroke-emphasis: 2.5px;

  /* State colors */
  --state-pass: #00FF00;
  --state-continue: #00CC00;
  --state-adjust: #009900;
  --state-uncertain: #006600;
  --state-error: #003300;

  /* Typography */
  --font-family: system-ui, -apple-system, sans-serif;
  --title-size: 15px;
  --subtitle-size: 11px;
  --body-size: 12px;
  --body-large-size: 14px;
  --caption-size: 10px;
  --legend-size: 11px;
  --hero-size: 17px;

  /* Spacing */
  --screen-pad-h: 10px;
  --header-h: 34px;
  --legend-h: 72px;
  --panel-pad: 10px;
  --line-gap: 6px;
  --safe-top: 80px;
  --safe-bottom: 560px;

  /* Layout */
  --screen-width: 480px;
  --screen-height: 640px;
  --safe-height: 480px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--glasses-background); color: var(--glasses-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }

@theme inline {
  --color-background: var(--glasses-bg);
  --color-foreground: var(--glasses-fg);
  --color-primary: var(--glasses-fg);
  --color-muted-foreground: var(--glasses-fg-muted);
  --color-muted: var(--glasses-fg-dim);
  --font-sans: var(--font-family);
}
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>

  <!-- Header -->
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  ">
    <span style="font-size: var(--title-size); font-weight: 700; color: var(--glasses-fg);">选择模式</span>
  </div>

  <!-- Page dots & indicator -->
  <div style="
    position: absolute;
    top: 72px;
    right: 30px;
    display: flex;
    align-items: center;
    gap: 6px;
  ">
    <span style="
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--glasses-fg-dim);
      display: inline-block;
    "></span>
    <span style="
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--glasses-fg);
      display: inline-block;
    "></span>
    <span style="
      font-size: var(--subtitle-size);
      color: var(--glasses-fg-muted);
      margin-left: 6px;
    ">2/2</span>
  </div>

  <!-- Mode card (centered in safe area) -->
  <div style="
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 180px;
    border: var(--glasses-stroke-normal) solid var(--glasses-fg);
    border-radius: 4px;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 16px 16px;
  ">
    <!-- Mode number -->
    <div style="
      position: absolute;
      top: 12px;
      left: 16px;
      font-size: var(--body-size);
      color: var(--glasses-fg-muted);
    ">2</div>

    <!-- Mode name -->
    <div style="
      font-size: 22px;
      font-weight: 700;
      color: var(--glasses-fg);
      margin-bottom: 14px;
      margin-top: 8px;
    ">学习模式</div>

    <!-- Separator line -->
    <div style="
      width: 220px;
      height: var(--glasses-stroke-thin);
      background: var(--glasses-fg-dim);
      margin-bottom: 18px;
    "></div>

    <!-- Description lines -->
    <div style="
      font-size: 13px;
      color: var(--glasses-fg-muted);
      text-align: center;
      margin-bottom: 8px;
    ">录制第一视角烹饪视频</div>
    <div style="
      font-size: 13px;
      color: var(--glasses-fg-muted);
      text-align: center;
    ">AI 自动生成菜谱草稿</div>
  </div>

  <!-- Bottom hints (plain text) -->
  <div style="
    position: absolute;
    top: 560px;
    left: 0;
    right: 0;
    width: 480px;
    height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    justify-content: center;
    border-top: 1px solid var(--glasses-fg-dim);
  ">
    <span style="font-size: var(--legend-size); color: var(--glasses-fg-muted);">单击 → 上一模式</span>
    <span style="font-size: var(--legend-size); color: var(--glasses-fg-muted);">长按 → 进入学习模式</span>
    <span style="font-size: var(--legend-size); color: var(--glasses-fg-muted);">双击 → 返回</span>
  </div>


    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: var(--screen-width);
        height: var(--screen-height);
        background: var(--glasses-bg);
        color: var(--glasses-fg);
        font-family: var(--font-family);
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
</body>
</html>
