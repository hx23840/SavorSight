<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜谱草稿</title>
    <style id="theme-vars">
/* SavorSight Glasses Bare UI — Rokid Glasses Design System */

:root {
  /* Color */
  --glasses-bg: #000000;
  --glasses-fg: #00FF00;
  --glasses-fg-dim: #00FF004D;
  --glasses-fg-muted: #00FF00BF;
  --glasses-stroke-thin: 1px;
  --glasses-stroke-normal: 2px;
  --glasses-stroke-emphasis: 2.5px;

  /* State colors */
  --state-pass: #00FF00;
  --state-continue: #00CC00;
  --state-adjust: #009900;
  --state-uncertain: #006600;
  --state-error: #003300;

  /* Typography */
  --font-family: system-ui, -apple-system, sans-serif;
  --title-size: 15px;
  --subtitle-size: 11px;
  --body-size: 12px;
  --body-large-size: 14px;
  --caption-size: 10px;
  --legend-size: 11px;
  --hero-size: 17px;

  /* Spacing */
  --screen-pad-h: 10px;
  --header-h: 34px;
  --legend-h: 72px;
  --panel-pad: 10px;
  --line-gap: 6px;
  --safe-top: 80px;
  --safe-bottom: 560px;

  /* Layout */
  --screen-width: 480px;
  --screen-height: 640px;
  --safe-height: 480px;
}

@theme inline {
  --color-background: var(--glasses-bg);
  --color-foreground: var(--glasses-fg);
  --color-primary: var(--glasses-fg);
  --color-muted-foreground: var(--glasses-fg-muted);
  --color-muted: var(--glasses-fg-dim);
  --font-sans: var(--font-family);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--glasses-background); color: var(--glasses-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>

    <!-- Header: title + page indicator -->
    <div class="header">
        <span class="header-title">菜谱草稿</span>
        <span class="header-page">1/3</span>
    </div>

    <!-- Main content within safe area (y=80~560) -->
    <div class="content">

        <!-- Dish name: 20px bold, centered -->
        <div class="dish-name">番茄炒蛋</div>

        <!-- Thin green separator -->
        <div class="thin-line"></div>

        <!-- Stroke border info box: overview -->
        <div class="stroke-box">
            <div class="info-line">2人份 · 约15分钟</div>
            <div class="info-line">5种食材 · 4个步骤</div>
        </div>

        <!-- Thin green separator -->
        <div class="thin-line"></div>

        <!-- Stroke border box: ingredients -->
        <div class="stroke-box">
            <div class="box-label">食材</div>
            <div class="ingredient-line">番茄 ×2 — 切块</div>
            <div class="ingredient-line">鸡蛋 ×3 — 打散</div>
            <div class="ingredient-line muted">… 等5种</div>
        </div>

    </div>

    <!-- Bottom hints: plain text, no buttons, no badges -->
    <div class="bottom-hints">
        <div class="hint-line">单击 → 下一屏（步骤）</div>
        <div class="hint-line">长按 → 确认保存</div>
        <div class="hint-line">双击 → 放弃返回</div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 480px;
            height: 640px;
            background: var(--glasses-bg);
            color: var(--glasses-fg);
            font-family: var(--font-family);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 480px;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--glasses-fg);
            letter-spacing: 2px;
        }

        .header-page {
            font-size: 11px;
            color: var(--glasses-fg-muted);
        }

        /* Main content area: safe zone y=80~560 */
        .content {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 16px;
        }

        /* Dish name */
        .dish-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--glasses-fg);
            text-align: center;
            margin-bottom: 12px;
        }

        /* Thin green separator line */
        .thin-line {
            width: 100%;
            height: 0;
            border-top: 1px solid var(--glasses-fg);
            margin-bottom: 10px;
        }

        /* Stroke-only bordered box */
        .stroke-box {
            width: 100%;
            border: 1px solid var(--glasses-fg);
            padding: 10px 12px;
            margin-bottom: 10px;
            background: transparent;
        }

        /* Box label */
        .box-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--glasses-fg);
            margin-bottom: 6px;
        }

        /* Info lines inside stroke box */
        .info-line {
            font-size: 14px;
            color: var(--glasses-fg);
            line-height: 22px;
        }

        /* Ingredient lines */
        .ingredient-line {
            font-size: 13px;
            color: var(--glasses-fg);
            line-height: 20px;
        }

        .ingredient-line.muted {
            color: var(--glasses-fg-muted);
        }

        /* Bottom hints */
        .bottom-hints {
            position: absolute;
            top: 560px;
            left: 0;
            width: 480px;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
            border-top: 1px solid var(--glasses-fg-dim);
        }

        .hint-line {
            font-size: 11px;
            color: var(--glasses-fg-muted);
            text-align: center;
            line-height: 16px;
        }
    </style>
</body>
</html>
